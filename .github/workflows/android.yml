name: Android CI — Build & APK

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build Debug + Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant gradlew execute permission
        run: chmod +x gradlew

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Cache Android build
        uses: actions/cache@v4
        with:
          path: |
            ~/.android/build-cache
          key: ${{ runner.os }}-android-build-${{ hashFiles('**/*.gradle*') }}
          restore-keys: |
            ${{ runner.os }}-android-build-

      - name: Run lint checks
        run: ./gradlew lint --no-daemon

      - name: ➡️ Run unit tests (must pass before APK build)
        run: ./gradlew test --no-daemon

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon
        if: success()

      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon
        if: success()

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: OmniFiles-debug-${{ github.run_number }}
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: OmniFiles-release-${{ github.run_number }}
          path: app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 30

      - name: Build Summary
        if: always()
        run: |
          echo "## ✅ Build Complete" >> $GITHUB_STEP_SUMMARY
          echo "| APK | Size | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|------|--------|" >> $GITHUB_STEP_SUMMARY
          if [ -f app/build/outputs/apk/debug/app-debug.apk ]; then
            SIZE=$(du -sh app/build/outputs/apk/debug/app-debug.apk 2>/dev/null | awk '{print $1}')
            echo "| Debug | $SIZE | ✅ |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Debug | - | ❌ |" >> $GITHUB_STEP_SUMMARY
          fi
          if [ -f app/build/outputs/apk/release/app-release-unsigned.apk ]; then
            SIZE=$(du -sh app/build/outputs/apk/release/app-release-unsigned.apk 2>/dev/null | awk '{print $1}')
            echo "| Release (unsigned) | $SIZE | ✅ |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Release (unsigned) | - | ❌ |" >> $GITHUB_STEP_SUMMARY
          fi
